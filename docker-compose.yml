version: '3.9'
services:
  parsival:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
      FASTMCP_SERVER_HOST: "0.0.0.0"
      FASTMCP_SERVER_PORT: "8000"
    volumes:
      - .:/app:rw
