version: '3.9'
services:
  parsival:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REDIS_ENABLED: "false"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
      MCP_TRANSPORT: "stdio"
      MCP_WORKSPACE_ROOT: "/app"
      MCP_ALLOWED_DIRECTORIES: "[\"/app\",\"/tmp\"]"
    volumes:
      - .:/app:rw
    stdin_open: true
    tty: false
    command: ["python", "-m", "src.mcp_entrypoint"]
